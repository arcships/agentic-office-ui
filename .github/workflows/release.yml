name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  candidate:
    name: Build and verify candidate
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Check out exact candidate commit
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.6
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
          package-manager-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.2
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Python test tools
        run: python -m pip install --requirement requirements-ci.txt

      - name: Install fixed release browsers
        run: python -m playwright install --with-deps chromium firefox webkit

      - name: Install locked JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Run the complete release gate
        env:
          CI_RUN_ID: ${{ github.run_id }}
          PERFORMANCE_BASELINE_CONFIG: tests/blackbox/performance-baseline-linux-x64.json
          RELEASE_EXPECTED_COMMIT: ${{ github.sha }}
          RELEASE_EXPECTED_TAG: ${{ github.ref_type == 'tag' && github.ref_name || '' }}
        run: pnpm test:release

      - name: Upload exact tested candidate
        uses: actions/upload-artifact@v7
        with:
          name: release-candidate-${{ github.sha }}
          path: output/acceptance/${{ github.sha }}/BB-RELEASE/${{ github.run_id }}/candidate/
          if-no-files-found: error
          retention-days: 90

      - name: Upload complete release evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: release-evidence-${{ github.sha }}-${{ github.run_id }}
          path: output/acceptance/${{ github.sha }}/BB-RELEASE/${{ github.run_id }}/
          if-no-files-found: error
          retention-days: 90

  publish:
    name: Publish verified candidate
    if: startsWith(github.ref, 'refs/tags/v')
    needs: candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: npm-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Set up Node.js for npm trusted publishing
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          registry-url: https://registry.npmjs.org

      - name: Download the tested candidate
        uses: actions/download-artifact@v7
        with:
          name: release-candidate-${{ github.sha }}
          path: candidate

      - name: Verify downloaded commit, version, files, and hashes
        env:
          RELEASE_EXPECTED_COMMIT: ${{ github.sha }}
          RELEASE_EXPECTED_TAG: ${{ github.ref_name }}
        run: node candidate/prepare-release-artifact.mjs verify candidate

      - name: Publish staged archives with npm publish, then promote
        env:
          RELEASE_EXPECTED_COMMIT: ${{ github.sha }}
          RELEASE_EXPECTED_TAG: ${{ github.ref_name }}
          RELEASE_STAGING_TAG: candidate-${{ github.run_id }}
          RELEASE_TARGET_TAG: latest
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node candidate/prepare-release-artifact.mjs publish candidate
