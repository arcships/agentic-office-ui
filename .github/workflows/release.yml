name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish CI candidate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      id-token: write
    steps:
      - name: Find the successful CI run for this commit
        id: ci
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          run_id=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow ci.yml \
            --event push \
            --commit "$GITHUB_SHA" \
            --status success \
            --limit 20 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -z "$run_id" ]; then
            echo "No successful CI run found for $GITHUB_SHA" >&2
            exit 1
          fi
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Download the exact candidate produced by CI
        uses: actions/download-artifact@v7
        with:
          name: release-candidate-${{ github.sha }}
          path: candidate
          repository: ${{ github.repository }}
          run-id: ${{ steps.ci.outputs.run_id }}
          github-token: ${{ github.token }}

      - name: Set up Node.js for npm publishing
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          registry-url: https://registry.npmjs.org

      - name: Verify commit, tag, package versions, files, and hashes
        env:
          RELEASE_EXPECTED_COMMIT: ${{ github.sha }}
          RELEASE_EXPECTED_TAG: ${{ github.ref_name }}
        run: node candidate/prepare-release-artifact.mjs verify candidate

      - name: Publish the six packages and promote them to latest
        env:
          RELEASE_EXPECTED_COMMIT: ${{ github.sha }}
          RELEASE_EXPECTED_TAG: ${{ github.ref_name }}
          RELEASE_STAGING_TAG: candidate-${{ github.run_id }}
          RELEASE_TARGET_TAG: latest
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: node candidate/prepare-release-artifact.mjs publish candidate
