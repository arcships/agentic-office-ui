name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Build and package
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.6
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
          package-manager-cache: true

      - name: Install locked JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages
        run: pnpm --filter './packages/*' -r build

      - name: Package the npm candidate
        if: github.event_name == 'push'
        env:
          PACK_EVIDENCE_DIR: output/release-pack
          RELEASE_CI_CANDIDATE: "1"
          RELEASE_CANDIDATE_DIR: output/release-candidate
          RELEASE_EXPECTED_COMMIT: ${{ github.sha }}
          RELEASE_PACK_MANIFEST: output/release-pack/summary.json
        run: |
          node scripts/ci/pack-manifests.mjs
          node scripts/ci/prepare-release-artifact.mjs

      - name: Upload the npm candidate
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: release-candidate-${{ github.sha }}
          path: output/release-candidate/
          if-no-files-found: error
          retention-days: 90
