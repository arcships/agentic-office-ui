name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Type, build, test, browser, package
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.6
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
          package-manager-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.2
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Python test tools
        run: python -m pip install --requirement requirements-ci.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Install locked JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository gate
        env:
          CI_RUN_ID: ${{ github.run_id }}
        run: pnpm check

      - name: Prepare the tested npm candidate
        if: github.event_name == 'push'
        env:
          PACK_EVIDENCE_DIR: output/release-pack
          RELEASE_CI_CANDIDATE: "1"
          RELEASE_CI_SUMMARY: output/acceptance/${{ github.sha }}/P1-CI-01/${{ github.run_id }}/check/summary.json
          RELEASE_CANDIDATE_DIR: output/release-candidate
          RELEASE_EXPECTED_COMMIT: ${{ github.sha }}
          RELEASE_PACK_MANIFEST: output/release-pack/summary.json
        run: |
          node scripts/ci/pack-manifests.mjs
          node scripts/ci/prepare-release-artifact.mjs

      - name: Upload the tested npm candidate
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: release-candidate-${{ github.sha }}
          path: output/release-candidate/
          if-no-files-found: error
          retention-days: 90

      - name: Upload acceptance evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: acceptance-${{ github.sha }}
          path: output/acceptance/
          if-no-files-found: error
          retention-days: 14
