name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    name: Type, build, test, browser, package
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.6
          run_install: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: pnpm
          package-manager-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.12.2
          cache: pip
          cache-dependency-path: requirements-ci.txt

      - name: Install Python test tools
        run: python -m pip install --requirement requirements-ci.txt

      - name: Install Chromium for Playwright
        run: python -m playwright install --with-deps chromium

      - name: Install locked JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Run repository gate
        run: pnpm check

      - name: Upload acceptance evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: acceptance-${{ github.sha }}
          path: output/acceptance/
          if-no-files-found: error
          retention-days: 14
